name: Reusable prek Autoupdate

on:
  workflow_call:
    inputs:
      cooldown-days:
        description: Cooldown days passed to prek auto-update.
        required: false
        type: string
        default: "7"
      update-day:
        description: UTC day of week to run prek auto-update, 0=Sunday through 6=Saturday. Manual runs always update.
        required: false
        type: string
        default: "1"
      update-branch:
        description: Branch used for the generated update PR.
        required: false
        type: string
        default: chore/prek-updates
      branch-prefix:
        description: Branch prefix considered owned by this workflow.
        required: false
        type: string
        default: chore/prek-updates
      label:
        description: Label applied to generated PRs and used for cleanup ownership checks.
        required: false
        type: string
        default: dependencies
      commit-message:
        description: Commit message for hook update commits.
        required: false
        type: string
        default: "chore: update prek hooks"
      pr-title:
        description: Title for hook update PRs.
        required: false
        type: string
        default: Bump prek Hooks
      add-paths:
        description: Newline-separated paths peter-evans/create-pull-request may commit.
        required: false
        type: string
        default: ""
      dispatch-workflows:
        description: Newline-separated workflow filenames or IDs to workflow_dispatch on the update branch.
        required: false
        type: string
        default: ""

concurrency:
  group: prek-autoupdate-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-hooks:
    name: Update prek Hooks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
    steps:
      - name: Check update day
        id: update-day
        env:
          UPDATE_DAY: ${{ inputs.update-day }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$(date -u +%w)" == "${UPDATE_DAY}" ]]; then
            echo "should-update=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should-update=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout Target Repository
        if: steps.update-day.outputs.should-update == 'true'
        uses: actions/checkout@v7
        with:
          path: target
          persist-credentials: false

      - name: Install prek
        if: steps.update-day.outputs.should-update == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: prek

      - name: Run prek auto-update
        if: steps.update-day.outputs.should-update == 'true'
        working-directory: target
        env:
          COOLDOWN_DAYS: ${{ inputs.cooldown-days }}
        run: |
          set -euo pipefail
          body_file="${GITHUB_WORKSPACE}/prek-autoupdate-body.md"
          cooldown_days="${COOLDOWN_DAYS}"
          {
            echo "Automated update of \`prek\` hooks."
            echo
            echo '```text'
            prek auto-update --cooldown-days "${cooldown_days}" 2>&1
            echo '```'
          } | tee "${body_file}"

      - name: Resolve add paths
        if: steps.update-day.outputs.should-update == 'true'
        id: add-paths
        working-directory: target
        env:
          ADD_PATHS: ${{ inputs.add-paths }}
        run: |
          set -euo pipefail

          if [[ -n "${ADD_PATHS}" ]]; then
            delimiter="$(openssl rand -hex 16)"
            {
              echo "value<<${delimiter}"
              printf '%s\n' "${ADD_PATHS}"
              echo "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          paths=()
          [[ -f prek.toml ]] && paths+=(prek.toml)
          [[ -f .pre-commit-config.yaml ]] && paths+=(.pre-commit-config.yaml)

          if [[ "${#paths[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one prek config file: prek.toml or .pre-commit-config.yaml"
            exit 1
          fi

          echo "value=${paths[0]}" >> "${GITHUB_OUTPUT}"

      - name: Create Pull Request
        if: steps.update-day.outputs.should-update == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          path: target
          token: ${{ github.token }}
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          branch: ${{ inputs.update-branch }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          labels: ${{ inputs.label }}
          delete-branch: true
          body-path: prek-autoupdate-body.md
          add-paths: ${{ steps.add-paths.outputs.value }}

  dispatch-workflows:
    name: Dispatch Update Branch Workflows
    needs: update-hooks
    runs-on: ubuntu-latest
    if: needs.update-hooks.outputs.pull-request-number != '' && inputs.dispatch-workflows != ''
    permissions:
      actions: write
    steps:
      - name: Dispatch workflows for update branch
        env:
          DISPATCH_WORKFLOWS: ${{ inputs.dispatch-workflows }}
          GH_TOKEN: ${{ github.token }}
          UPDATE_BRANCH: ${{ inputs.update-branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          while IFS= read -r workflow; do
            [[ -z "${workflow}" ]] && continue
            gh workflow run "${workflow}" --repo "${REPOSITORY}" --ref "${UPDATE_BRANCH}"
          done <<< "${DISPATCH_WORKFLOWS}"

  cleanup:
    name: Cleanup prek Update PRs
    needs:
      - update-hooks
      - dispatch-workflows
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Tooling Repository
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: tooling
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Close stale prek update PRs
        env:
          BODY_MARKER: Automated update of `prek` hooks.
          GITHUB_TOKEN: ${{ github.token }}
          KEEP_PR_NUMBER: ${{ needs.update-hooks.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
          UPDATE_BRANCH: ${{ inputs.update-branch }}
          BRANCH_PREFIX: ${{ inputs.branch-prefix }}
          LABEL_NAME: ${{ inputs.label }}
        run: |
          set -euo pipefail

          update_branch="${UPDATE_BRANCH}"
          branch_prefix="${BRANCH_PREFIX}"
          label_name="${LABEL_NAME}"

          args=(
            --repository "${REPOSITORY}"
            --branch "${update_branch}"
            --branch-prefix "${branch_prefix}"
            --label-name "${label_name}"
            --author-login 'github-actions[bot]'
            --body-marker "${BODY_MARKER}"
            --close-stale-prs
            --delete-stale-branches
            --delete-merged-branches
          )

          if [[ -n "${KEEP_PR_NUMBER}" ]]; then
            args+=(--keep-pr-number "${KEEP_PR_NUMBER}")
          else
            args+=(--keep-latest-open-pr)
          fi

          python tooling/src/prek_autoupdate/cleanup_prek_update_branches.py "${args[@]}"
